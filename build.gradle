plugins {
    id 'java'
    id 'application'
}

group = 'ogl2.exam'
version = '1.0.0'

repositories {
    mavenCentral()
}

java {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
}

application {
    mainClass = 'ogl2.exam.Project'
}

dependencies {
    implementation fileTree(dir: 'lib', include: ['*.jar'])
}
